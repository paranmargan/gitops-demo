apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx
  namespace: argocd

spec: 
  project: default
  
  source:
   repoURL: https://github.com/paranmargan/gitops-demo.git
   targetRevision: HEAD
   path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy: 
    automated: {}
